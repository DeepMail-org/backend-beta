# ============================================================
# DeepMail Configuration
# ============================================================
# Environment variable overrides use the prefix DEEPMAIL_
# e.g. DEEPMAIL_SERVER__PORT=8080 overrides [server].port
# ============================================================

[server]
host = "127.0.0.1"
port = 3000
# Maximum request body size in bytes (50 MB)
max_body_size = 52428800

[database]
# Path to SQLite database file (created automatically)
path = "data/deepmail.db"
# Connection pool size
pool_size = 8
# Busy timeout in milliseconds
busy_timeout_ms = 5000

[redis]
url = "redis://127.0.0.1:6379"
# Stream name for job queue
stream_name = "deepmail:jobs"
# Consumer group name
consumer_group = "workers"

[upload]
# Maximum file size in bytes (25 MB)
max_file_size = 26214400
# Allowed file extensions (lowercase, without dot)
allowed_extensions = ["eml", "msg"]
# Quarantine directory (relative to workspace root)
quarantine_path = "data/quarantine"

[security]
# Rate limit: max requests per second per IP
rate_limit_rps = 10
# Rate limit burst capacity
rate_limit_burst = 20
# JWT secret (override via DEEPMAIL_SECURITY__JWT_SECRET in production!)
jwt_secret = "CHANGE_ME_IN_PRODUCTION"

[logging]
# Log level: trace, debug, info, warn, error
level = "info"
# Output format: "json" or "pretty"
format = "json"

[cache]
# Time-to-live in seconds for cached IP reputation lookups (default: 1 hour)
ip_ttl_secs = 3600
# Time-to-live in seconds for cached domain reputation lookups (default: 1 hour)
domain_ttl_secs = 3600
# Time-to-live in seconds for cached file hash lookups (default: 24 hours)
# Hash-based results are stable (same file = same result), so TTL is longer.
hash_ttl_secs = 86400

[pipeline]
url_analysis_timeout_ms = 3000
attachment_analysis_timeout_ms = 5000
stage_retry_attempts = 2

[worker]
max_concurrent_jobs = 4

[sandbox]
enabled = true
backend = "docker"
queue_stream = "deepmail:queue:sandbox"
docker_image = "deepmail/sandbox-playwright:latest"
docker_network = "deepmail_sandbox_net"
seccomp_profile = "./crates/deepmail-sandbox/assets/seccomp/chromium-minimal.json"
execution_timeout_ms = 15000
cpu_limit = "1.0"
memory_limit = "512m"
pids_limit = 128
progress_channel = "deepmail:events:progress"

[features]
enable_sandbox = true
enable_similarity = false
enable_intel_providers = true

[tenant]
uploads_per_day = 100
sandbox_executions_per_day = 100
url_reuse_ttl_secs = 3600
domain_reuse_ttl_secs = 1800
sandbox_reuse_ttl_secs = 86400

[observability]
otlp_endpoint = "http://127.0.0.1:4317"
service_namespace = "deepmail"

[reliability]
max_retry_attempts = 3
retry_base_backoff_ms = 500
retry_max_backoff_ms = 10000
rate_limit_capacity = 60
rate_limit_refill_per_sec = 10.0

[retention]
emails_ttl_days = 30
sandbox_reports_ttl_days = 30
logs_ttl_days = 14
cleanup_interval_secs = 3600

[circuit_breaker]
failure_threshold = 5
cooldown_secs = 30
half_open_max_probes = 2
