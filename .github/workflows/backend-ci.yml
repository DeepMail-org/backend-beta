name: backend-ci

on:
  push:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run API tests
        run: cargo test -p deepmail-api
      - name: Run worker tests
        run: cargo test -p deepmail-worker
      - name: Migration rollback smoke test
        run: ./scripts/ci/migration_smoke.sh
