[server]
host = "0.0.0.0"
port = 3001
max_body_size = 52428800

[database]
path = "data/deepmail.db"
pool_size = 8
busy_timeout_ms = 5000

[redis]
url = "redis://127.0.0.1:6379"
stream_name = "deepmail:jobs"
consumer_group = "workers"

[upload]
max_file_size = 26214400
allowed_extensions = ["eml", "msg"]
quarantine_path = "data/quarantine"

[security]
rate_limit_rps = 10
rate_limit_burst = 20
jwt_secret = "CHANGE_ME_IN_PRODUCTION"
jwt_issuer = "deepmail-inhouse"
jwt_audience = "deepmail-clients"
token_ttl_days = 7
otp_ttl_minutes = 10
otp_max_attempts = 5
otp_lockout_secs = 900
mtls_required_for_auth_admin = true
trusted_client_cert_fingerprints = []

[logging]
level = "info"
format = "json"

[cache]
ip_ttl_secs = 3600
domain_ttl_secs = 3600
hash_ttl_secs = 86400

[pipeline]
url_analysis_timeout_ms = 3000
attachment_analysis_timeout_ms = 5000
stage_retry_attempts = 2

[worker]
max_concurrent_jobs = 4

[sandbox]
enabled = true
backend = "docker"
queue_stream = "deepmail:queue:sandbox"
docker_image = "deepmail/sandbox-playwright:latest"
docker_network = "deepmail_sandbox_net"
seccomp_profile = "./crates/deepmail-sandbox/assets/seccomp/chromium-minimal.json"
execution_timeout_ms = 15000
cpu_limit = "1.0"
memory_limit = "512m"
pids_limit = 128
progress_channel = "deepmail:events:progress"

[features]
enable_sandbox = true
enable_similarity = false
enable_intel_providers = true

[tenant]
uploads_per_day = 100
sandbox_executions_per_day = 100
url_reuse_ttl_secs = 3600
domain_reuse_ttl_secs = 1800
sandbox_reuse_ttl_secs = 86400

[observability]
otlp_endpoint = "http://127.0.0.1:4317"
otlp_enabled = false
otlp_batch_size = 512
otlp_batch_timeout_secs = 5
service_namespace = "deepmail"

[reliability]
max_retry_attempts = 3
retry_base_backoff_ms = 500
retry_max_backoff_ms = 10000
rate_limit_capacity = 60
rate_limit_refill_per_sec = 10.0

[retention]
archive_after_days = 30
soft_delete_after_days = 30
purge_after_days = 30
cleanup_interval_secs = 3600
logs_ttl_days = 14

[circuit_breaker]
failure_threshold = 5
cooldown_secs = 30
half_open_max_probes = 2

[backup]
backup_dir = "data/backups"
passphrase_env_var = "DEEPMAIL_BACKUP_PASSPHRASE"
argon2_memory_kib = 65536
argon2_iterations = 3
argon2_parallelism = 4

[abuse]
enabled = true
upload_velocity_per_min = 20
sandbox_velocity_per_min = 15
failed_upload_threshold_5min = 10
pattern_scan_interval_secs = 300
repeated_malicious_hash_threshold = 5
sandbox_harvest_threshold = 50
